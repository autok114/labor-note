name: Update official labor news and deploy

on:
  workflow_dispatch:
  schedule:
    # 09:17, 13:17, 17:17, 21:17 Korea Standard Time
    - cron: "17 0,4,8,12 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: labor-note-pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect official updates
        run: npm run update:data

      - name: Save collected data
        shell: bash
        run: |
          if git diff --quiet -- data/generated-articles.json; then
            echo "No data changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/generated-articles.json
            git commit -m "Update official labor briefing data"
            git push
          fi

      - name: Build public site
        run: npm run build:pages

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
